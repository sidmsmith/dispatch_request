<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Dispatch Request v1.0.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #ffffff; --text-color: #1f2933; --text-muted: #616e7c;
      --card-bg: #f8fafc; --border-color: #d9e2ec; --input-bg: #ffffff;
      --input-border: #cbd5e0; --input-focus-bg: #ffffff; --input-focus-border: #339af0;
      --input-focus-shadow: rgba(51,154,240,0.25); --primary-color: #339af0;
      --primary-hover: #228be6; --success-color: #28a745; --danger-color: #dc3545;
      --header-text: #1f2933;
    }
    html, body { height: 100%; margin: 0; background: var(--bg-color); color: var(--text-color); }
    body { padding: 1rem; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .card-shell { max-width: 1150px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem 1.25rem 1.25rem; position: relative; }
    .header-row { display: flex; justify-content: center; margin-bottom: 1rem; position: relative; }
    .header-center { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .header-title { margin: 0; font-size: 1.55rem; font-weight: 700; color: var(--header-text); text-align: center; }
    .app-version { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
    .logo-wrapper { display: flex; justify-content: center; width: 100%; margin-bottom: 0.25rem; }
    .logo-wrapper img.app-logo { max-height: 24px; width: auto; display: block; }
    .theme-dropdown { position: relative; }
    .theme-selector-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      transition: transform 0.3s ease;
      z-index: 5;
    }
    .theme-selector-btn:hover { transform: rotate(90deg); }
    .theme-popup { position: absolute; right: 0; top: 110%; width: 200px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.45rem; display: none; z-index: 30; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .theme-popup.visible { display: block; }
    .theme-option { width: 100%; text-align: left; border: none; background: transparent; color: var(--text-color); padding: 0.4rem 0.5rem; border-radius: 6px; font-size: 0.9rem; }
    .theme-option:hover, .theme-option.active { background: rgba(51,154,240,0.12); }
    .form-control, .form-select { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-color); }
    .form-control:focus, .form-select:focus { background: var(--input-focus-bg); border-color: var(--input-focus-border); box-shadow: 0 0 0 0.2rem var(--input-focus-shadow); color: var(--text-color); }
    .btn-primary { background: var(--primary-color); border-color: var(--primary-color); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-success { background: var(--success-color); border-color: var(--success-color); }
    .btn:disabled, .btn.disabled, button:disabled { background: #b8bec7 !important; border-color: #b8bec7 !important; color: #f4f6f8 !important; opacity: 1 !important; cursor: not-allowed !important; box-shadow: none !important; }
    .status { min-height: 1.2rem; font-size: 0.92rem; margin-top: 0.5rem; }
    .status.error { color: #dc3545; } .status.success { color: #2f9e44; } .status.info { color: var(--text-muted); }
    .section { border: 1px solid var(--border-color); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 0.95rem; background: var(--input-bg); }
    .section h6 { margin: 0 0 0.75rem; font-weight: 700; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem 1rem; }
    .readonly-field { background: color-mix(in srgb, var(--input-bg) 90%, #d1d5db 10%); }
    .field-wrap { position: relative; }
    .stop-card {
      border: 1px dashed var(--border-color);
      border-radius: 10px;
      padding: 0.7rem;
      margin-bottom: 0.75rem;
      background: #ffffff;
      position: relative;
      transition: box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
    }
    .stop-card.alt { background: #eaf4ff; border-color: #8ec5ff; }
    .stop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .stop-actions { display: flex; gap: 0.4rem; align-items: center; }
    .drag-handle-btn {
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      cursor: grab;
    }
    .drag-handle-btn:active { cursor: grabbing; }
    .stop-card.drag-source {
      opacity: 0.72;
      transform: scale(0.99);
    }
    .stop-card.drag-over {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(51,154,240,0.45), 0 10px 22px rgba(0,0,0,0.14);
      transform: translateY(-1px);
    }
    .stop-card.drag-over::before {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      top: -9px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 10px rgba(51,154,240,0.55);
    }
    .mini-grid th, .mini-grid td { font-size: 0.88rem; vertical-align: middle; }
    .muted-note { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.25rem; }
    #mainScreen { display: none; }
    .submit-wrap { text-align: center; }
    #submitStatus { text-align: center; }
  </style>
</head>
<body>
  <div class="card-shell">
    <div class="header-row">
      <div class="header-center">
        <div class="logo-wrapper">
          <img src="/manhattan-logo.png" alt="Manhattan Associates" class="app-logo" onerror="this.style.display='none'" />
        </div>
        <h1 class="header-title"><i class="fas fa-route"></i> Manual Dispatch Request</h1>
        <div class="app-version">v1.0.0</div>
      </div>
      <div class="theme-dropdown" id="themeContainer">
        <button id="themeBtn" class="theme-selector-btn" title="Select Theme"><i class="fas fa-cog"></i></button>
        <div id="themePopup" class="theme-popup">
          <button class="theme-option active" data-theme="light">Light</button>
          <button class="theme-option" data-theme="dark">Dark</button>
          <button class="theme-option" data-theme="manhattan">Manhattan</button>
          <button class="theme-option" data-theme="loves">Love's Travel Stops</button>
          <button class="theme-option" data-theme="rockline">Rockline Industries</button>
          <button class="theme-option" data-theme="hyvee">Hy-Vee</button>
        </div>
      </div>
    </div>

    <div id="authSection">
      <label class="form-label fw-semibold">ORG</label>
      <div class="d-flex gap-2 align-items-center">
        <input id="orgInput" class="form-control" style="max-width:260px;" placeholder="Enter ORG" />
        <button id="authBtn" class="btn btn-success">Authenticate</button>
      </div>
      <div id="authStatus" class="status info"></div>
    </div>

    <div id="mainScreen">
      <div class="section">
        <h6>Movement</h6>
        <div class="grid-2">
          <div>
            <label class="form-label fw-semibold">Order Type / Reason Code</label>
            <input class="form-control readonly-field" value="Manual Dispatch Request" readonly />
          </div>
          <div>
            <label class="form-label fw-semibold">Terminal <span class="text-danger">*</span></label>
            <select id="terminalSelect" class="form-select"></select>
          </div>
          <div>
            <label class="form-label fw-semibold">Driver Type</label>
            <select id="driverType" class="form-select"></select>
          </div>
          <div>
            <label class="form-label fw-semibold">Tractor Type</label>
            <select id="tractorType" class="form-select"></select>
          </div>
          <div>
            <label class="form-label fw-semibold">Trailer Type</label>
            <select id="trailerType" class="form-select"></select>
          </div>
        </div>
      </div>

      <div class="section">
        <h6>Origin</h6>
        <div class="field-wrap">
          <label class="form-label fw-semibold">Origin Facility <span class="text-danger">*</span></label>
          <select id="originSelect" class="form-select"></select>
          <div class="muted-note">Must match an existing facility in Facility Master.</div>
        </div>
      </div>

      <div class="section">
        <h6>Delivery Stops</h6>
        <div id="stopsContainer"></div>
        <button id="addStopBtn" class="btn btn-outline-primary btn-sm"><i class="fas fa-plus"></i> Add Stop</button>
      </div>

      <div class="section">
        <h6>Dates & Times</h6>
        <div class="grid-2">
          <div>
            <label class="form-label fw-semibold">Pickup Start <span class="text-danger">*</span></label>
            <input id="pickupStart" type="datetime-local" class="form-control" />
          </div>
          <div>
            <label class="form-label fw-semibold">Pickup End <span class="text-danger">*</span></label>
            <input id="pickupEnd" type="datetime-local" class="form-control" />
          </div>
          <div>
            <label class="form-label fw-semibold">Delivery Start <span class="text-danger">*</span></label>
            <input id="deliveryStart" type="datetime-local" class="form-control" />
          </div>
          <div>
            <label class="form-label fw-semibold">Delivery End <span class="text-danger">*</span></label>
            <input id="deliveryEnd" type="datetime-local" class="form-control" />
          </div>
        </div>
      </div>

      <div class="submit-wrap">
        <button id="submitBtn" class="btn btn-success px-5"><i class="fas fa-paper-plane"></i> Submit</button>
      </div>
      <div id="submitStatus" class="status info"></div>
    </div>
  </div>

  <script>
    let token = null;
    let allFacilities = [];
    let productClassOptions = [];
    let driverTypeOptions = [];
    let tractorTypeOptions = [];
    let trailerTypeOptions = [];
    let defaultDriverTypeId = '';
    let defaultTractorTypeId = '';
    let defaultTrailerTypeId = '';
    let stops = [];
    let facilityOptionsHtml = '';
    let idSeq = 1;
    let draggingStopId = null;
    let isRestoringState = false;
    let isBootstrappingForm = false;
    const FORM_STORAGE_KEY = 'dispatch_request_form_state_v1';
    const PRODUCT_CLASS_WEIGHT_DEFAULTS_RAW = {
      '12BR': 1500, '12OM': 1500, 'ACCSSRY': 1100, 'ACID': 2150, 'APPAREL': 1000,
      'AUTO': 1600, 'BATHBODY': 1150, 'CLOTHES': 1000, 'CLOTHING': 1000, 'COSMETIC': 1150,
      'DRY': 1500, 'ELECTRNC': 1150, 'ELECTRONICS': 1150, 'FLOORLD': 1600, 'FMD': 1500,
      'FROZEN': 1850, 'GLOVES': 1050, 'GROCERY': 1600, 'HAZMAT': 2000, 'HOMEGOODS': 1400,
      'INB': 1500, 'KITCHEN': 1300, 'LIQUOR': 2100, 'LNH': 1500, 'MEDICAL': 1400,
      'OUT': 1500, 'OUTDOOR': 1600, 'PALLET': null, 'PC': 1500, 'PC01': 1500, 'PC1': 1500,
      'PE': 1500, 'PHARMA': 1400, 'PL01': 1500, 'PRODUCE': 1500, 'REEFER': 1750,
      'REFRIGERATED': 1750, 'RUGS': 1600, 'SHOES': 1200, 'SURGICAL': 1400, 'TOYS': 1100,
      'WINE': 2100, 'BATTERIES': 1850, 'MOTOR OIL': 2100, 'TIRES': 2000, 'SPARK PLUGS': 1300,
      'CHEESE': 1700, 'PIZZA SAUCE': 1900, 'FLOUR': 1500, 'CUPS 16OZ': 1050, 'GENERATORS': 2000,
      'ALUMINUMCOIL': 2500, 'BOXES': 1100, 'CHEMICAL': 2150, 'COOLER': 1750, 'FS': 1500,
      'AMBIENT': 1500, 'FISH': 1750, 'MERCH': 1400, 'OF': 1500, 'MEDICAL SUPPLIES': 1400,
      'IB-FRZ': 1850, 'IB-REF': 1750, 'IB-DRY': 1500, 'OB-FRZ': 1850, 'OB-PRO': 1500,
      'OB-CHGRO': 1600, 'OB-HBC': 1200, 'PDIFRSH': 1500, 'OB-LDC': 1500, 'UNKNOWN': 1500,
      'PERISHABLE': 1700
    };
    const PRODUCT_CLASS_CUBE_DEFAULTS_RAW = {
      '12BR': 55, '12OM': 55, 'ACCSSRY': 70, 'ACID': 45, 'APPAREL': 85,
      'AUTO': 60, 'BATHBODY': 70, 'CLOTHES': 85, 'CLOTHING': 85, 'COSMETIC': 70,
      'DRY': 60, 'ELECTRNC': 65, 'ELECTRONICS': 65, 'FLOORLD': 60, 'FMD': 60,
      'FROZEN': 50, 'GLOVES': 75, 'GROCERY': 55, 'HAZMAT': 50, 'HOMEGOODS': 65,
      'INB': 60, 'KITCHEN': 65, 'LIQUOR': 45, 'LNH': 60, 'MEDICAL': 65,
      'OUT': 60, 'OUTDOOR': 60, 'PALLET': null, 'PC': 60, 'PC01': 60, 'PC1': 60,
      'PE': 60, 'PHARMA': 65, 'PL01': 60, 'PRODUCE': 55, 'REEFER': 55,
      'REFRIGERATED': 55, 'RUGS': 70, 'SHOES': 70, 'SURGICAL': 65, 'TOYS': 80,
      'WINE': 45, 'BATTERIES': 50, 'MOTOR OIL': 45, 'TIRES': 60, 'SPARK PLUGS': 55,
      'CHEESE': 50, 'PIZZA SAUCE': 45, 'FLOUR': 60, 'CUPS 16OZ': 80, 'GENERATORS': 55,
      'ALUMINUMCOIL': 40, 'BOXES': 90, 'CHEMICAL': 45, 'COOLER': 55, 'FS': 55,
      'AMBIENT': 60, 'FISH': 50, 'MERCH': 65, 'OF': 60, 'MEDICAL SUPPLIES': 65,
      'IB-FRZ': 50, 'IB-REF': 55, 'IB-DRY': 60, 'OB-FRZ': 50, 'OB-PRO': 55,
      'OB-CHGRO': 55, 'OB-HBC': 70, 'PDIFRSH': 55, 'OB-LDC': 60, 'UNKNOWN': 65,
      'PERISHABLE': 55
    };

    const THEMES = {
      light: {'--bg-color':'#ffffff','--text-color':'#1f2933','--text-muted':'#616e7c','--card-bg':'#f8fafc','--border-color':'#d9e2ec','--input-bg':'#ffffff','--input-border':'#cbd5e0','--input-focus-bg':'#ffffff','--input-focus-border':'#339af0','--input-focus-shadow':'rgba(51,154,240,0.25)','--primary-color':'#339af0','--primary-hover':'#228be6','--success-color':'#28a745','--danger-color':'#dc3545','--header-text':'#1f2933'},
      dark: {'--bg-color':'#1a1d23','--text-color':'#e2e8f0','--text-muted':'#a0aec0','--card-bg':'#2d3748','--border-color':'#4a5568','--input-bg':'#2d3748','--input-border':'#4a5568','--input-focus-bg':'#2d3748','--input-focus-border':'#63b3ed','--input-focus-shadow':'rgba(99,179,237,0.25)','--primary-color':'#63b3ed','--primary-hover':'#4299e1','--success-color':'#48bb78','--danger-color':'#fc8181','--header-text':'#e2e8f0'},
      manhattan: {'--bg-color':'#2d2f3b','--text-color':'#e0e0e0','--text-muted':'#b0b0b0','--card-bg':'#484e5e','--border-color':'#5a6172','--input-bg':'#3a3f4e','--input-border':'#5a6172','--input-focus-bg':'#3a3f4e','--input-focus-border':'#339af0','--input-focus-shadow':'rgba(51,154,240,0.25)','--primary-color':'#339af0','--primary-hover':'#228be6','--success-color':'#51cf66','--danger-color':'#ff6b6b','--header-text':'#e0e0e0'},
      loves: {'--bg-color':'#ffffff','--text-color':'#212529','--text-muted':'#6c757d','--card-bg':'#ffffff','--border-color':'#dee2e6','--input-bg':'#f5f5f5','--input-border':'#ced4da','--input-focus-bg':'#ffffff','--input-focus-border':'#E31837','--input-focus-shadow':'rgba(227,24,55,0.25)','--primary-color':'#E31837','--primary-hover':'#C0142D','--success-color':'#28a745','--danger-color':'#dc3545','--header-text':'#212529'},
      rockline: {'--bg-color':'#ffffff','--text-color':'#2d2d2d','--text-muted':'#6b7d66','--card-bg':'#ffffff','--border-color':'#d4ddd0','--input-bg':'#f0f2ee','--input-border':'#b8c9b3','--input-focus-bg':'#ffffff','--input-focus-border':'#6EB43F','--input-focus-shadow':'rgba(110,180,63,0.25)','--primary-color':'#6EB43F','--primary-hover':'#5a9a32','--success-color':'#6EB43F','--danger-color':'#c62828','--header-text':'#2d2d2d'},
      hyvee: {'--bg-color':'#ffffff','--text-color':'#1f1f1f','--text-muted':'#6c757d','--card-bg':'#ffffff','--border-color':'#e0d6d6','--input-bg':'#faf7f7','--input-border':'#d4c9c9','--input-focus-bg':'#ffffff','--input-focus-border':'#E2231A','--input-focus-shadow':'rgba(226,35,26,0.25)','--primary-color':'#E2231A','--primary-hover':'#c41e16','--success-color':'#28a745','--danger-color':'#dc3545','--header-text':'#1f1f1f'}
    };
    const THEME_LOGOS = {
      light: '/manhattan-logo.png',
      dark: '/manhattan-logo.png',
      manhattan: '/manhattan-logo.png',
      loves: '/loves-logo.png',
      rockline: '/rockline_logo.png',
      hyvee: '/hyvee-logo.png'
    };

    function setStatus(el, text, type = 'info') { el.textContent = text || ''; el.className = `status ${type}`; }
    async function api(path, body) {
      const r = await fetch(`/api/${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
      return r.json();
    }
    function applyTheme(name) {
      const vars = THEMES[name]; if (!vars) return;
      for (const [k, v] of Object.entries(vars)) document.documentElement.style.setProperty(k, v);
      const logo = document.querySelector('.app-logo');
      if (logo && THEME_LOGOS[name]) {
        logo.src = THEME_LOGOS[name];
        logo.style.display = '';
      }
      localStorage.setItem('dispatch_request_theme', name);
      document.querySelectorAll('.theme-option').forEach(o => o.classList.toggle('active', o.dataset.theme === name));
    }
    function formatDtLocal(d) {
      const yyyy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
    }
    function roundUp30(d) {
      const x = new Date(d); x.setSeconds(0); x.setMilliseconds(0);
      const m = x.getMinutes(); const add = m % 30 === 0 ? 0 : 30 - (m % 30);
      x.setMinutes(m + add); return x;
    }
    function applyDateDefaults() {
      const pickupStart = roundUp30(new Date());
      const pickupEnd = new Date(pickupStart.getTime() + (2 * 60 * 60 * 1000));
      const deliveryStart = new Date(pickupEnd.getTime() + (4 * 60 * 60 * 1000));
      const deliveryEnd = new Date(deliveryStart.getTime() + (2 * 60 * 60 * 1000));
      document.getElementById('pickupStart').value = formatDtLocal(pickupStart);
      document.getElementById('pickupEnd').value = formatDtLocal(pickupEnd);
      document.getElementById('deliveryStart').value = formatDtLocal(deliveryStart);
      document.getElementById('deliveryEnd').value = formatDtLocal(deliveryEnd);
    }
    function fillTypeSelect(selectId, options, defaultId) {
      const sel = document.getElementById(selectId);
      const noneLabel = '-- Select --';
      sel.innerHTML = `<option value="">${noneLabel}</option>` + options.map(o => {
        const isDefault = defaultId && o.Id === defaultId;
        const label = isDefault ? `${o.Display} (default)` : o.Display;
        return `<option value="${o.Id}">${label}</option>`;
      }).join('');
      sel.value = defaultId || '';
    }
    function saveFormState() {
      if (isRestoringState || isBootstrappingForm) return;
      const state = {
        terminalId: document.getElementById('terminalSelect').value || '',
        originFacilityId: document.getElementById('originSelect').value || '',
        driverTypeId: document.getElementById('driverType').value || '',
        tractorTypeId: document.getElementById('tractorType').value || '',
        trailerTypeId: document.getElementById('trailerType').value || '',
        stops: stops.map(s => ({
          sequence: Number(s.sequence || 0),
          deliveryFacilityId: s.deliveryFacilityId || '',
          products: (s.products || []).map(p => ({
            productClass: p.productClass || '',
            avgWeight: p.avgWeight ?? '',
            avgCube: p.avgCube ?? '',
            pallets: p.pallets ?? ''
          }))
        }))
      };
      localStorage.setItem(FORM_STORAGE_KEY, JSON.stringify(state));
    }
    async function restoreFormState() {
      const raw = localStorage.getItem(FORM_STORAGE_KEY);
      if (!raw) return;
      let state = null;
      try { state = JSON.parse(raw); } catch (_) { return; }
      if (!state || typeof state !== 'object') return;

      isRestoringState = true;
      try {
        const terminalSel = document.getElementById('terminalSelect');
        const terminalId = state.terminalId || '';
        if (terminalId) {
          terminalSel.value = terminalId;
          await loadTerminalResourceDefaults();
        }
        if (state.originFacilityId) document.getElementById('originSelect').value = state.originFacilityId;
        if (state.driverTypeId) document.getElementById('driverType').value = state.driverTypeId;
        if (state.tractorTypeId) document.getElementById('tractorType').value = state.tractorTypeId;
        if (state.trailerTypeId) document.getElementById('trailerType').value = state.trailerTypeId;

        if (Array.isArray(state.stops) && state.stops.length) {
          stops = [];
          idSeq = 1;
          for (const ss of state.stops) {
            const products = Array.isArray(ss.products) && ss.products.length
              ? ss.products.map(p => ({
                  productClass: p.productClass || '',
                  avgWeight: p.avgWeight ?? '',
                  avgCube: p.avgCube ?? '',
                  pallets: p.pallets ?? ''
                }))
              : [{
                  productClass: firstProductClassId(),
                  avgWeight: defaultAvgWeightForProductClass(firstProductClassId()),
                  avgCube: defaultAvgCubeForProductClass(firstProductClassId()),
                  pallets: ''
                }];
            stops.push({
              id: idSeq++,
              sequence: Number(ss.sequence || 0),
              deliveryFacilityId: ss.deliveryFacilityId || '',
              products
            });
          }
          renderStops();
        }
      } finally {
        isRestoringState = false;
      }
    }

    function resetTypeDropdowns() {
      driverTypeOptions = [];
      tractorTypeOptions = [];
      trailerTypeOptions = [];
      defaultDriverTypeId = '';
      defaultTractorTypeId = '';
      defaultTrailerTypeId = '';
      fillTypeSelect('driverType', driverTypeOptions, defaultDriverTypeId);
      fillTypeSelect('tractorType', tractorTypeOptions, defaultTractorTypeId);
      fillTypeSelect('trailerType', trailerTypeOptions, defaultTrailerTypeId);
    }

    async function loadTerminalResourceDefaults() {
      const terminalId = document.getElementById('terminalSelect').value;
      if (!terminalId) {
        resetTypeDropdowns();
        validateForm();
        return;
      }
      const org = document.getElementById('orgInput').value.trim();
      const res = await api('terminal_resource_defaults', { org, token, terminalId });
      if (!res.success) {
        setStatus(document.getElementById('submitStatus'), res.error || 'Failed loading terminal type defaults.', 'error');
        resetTypeDropdowns();
        validateForm();
        return;
      }
      driverTypeOptions = res.driverTypes || [];
      tractorTypeOptions = res.tractorTypes || [];
      trailerTypeOptions = res.trailerTypes || [];
      defaultDriverTypeId = res.defaultDriverTypeId || '';
      defaultTractorTypeId = res.defaultTractorTypeId || '';
      defaultTrailerTypeId = res.defaultTrailerTypeId || '';
      fillTypeSelect('driverType', driverTypeOptions, defaultDriverTypeId);
      fillTypeSelect('tractorType', tractorTypeOptions, defaultTractorTypeId);
      fillTypeSelect('trailerType', trailerTypeOptions, defaultTrailerTypeId);
      validateForm();
    }
    function facilityLabel(f) {
      const fid = (f.FacilityId || '').trim();
      const desc = (f.Description || '').trim();
      if (desc) return `${fid}: ${desc}`;
      return fid;
    }
    function firstProductClassId() {
      return '';
    }
    function productClassOptionsHtml(selectedId) {
      return `<option value="">-- Select Product Class --</option>` + productClassOptions
        .map(pc => `<option value="${pc.ProductClassId}" ${pc.ProductClassId === selectedId ? 'selected' : ''}>${pc.Display}</option>`)
        .join('');
    }
    function normalizeProductClassKey(v) {
      return (v || '').toString().trim().toUpperCase();
    }
    function defaultAvgWeightForProductClass(productClassId) {
      const key = normalizeProductClassKey(productClassId);
      if (!key) return 0;
      const val = PRODUCT_CLASS_WEIGHT_DEFAULTS_RAW[key];
      if (typeof val === 'number' && Number.isFinite(val)) return val;
      return 0;
    }
    function defaultAvgCubeForProductClass(productClassId) {
      const key = normalizeProductClassKey(productClassId);
      if (!key) return 0;
      const val = PRODUCT_CLASS_CUBE_DEFAULTS_RAW[key];
      if (typeof val === 'number' && Number.isFinite(val)) return val;
      return 0;
    }
    function addStop() {
      const pc = firstProductClassId();
      stops.push({
        id: idSeq++,
        sequence: stops.length + 1,
        deliveryFacilityId: '',
        products: [{
          productClass: pc,
          avgWeight: defaultAvgWeightForProductClass(pc),
          avgCube: defaultAvgCubeForProductClass(pc),
          pallets: ''
        }]
      });
      renderStops(); validateForm();
    }
    function moveStop(dragId, targetId) {
      if (!dragId || !targetId || dragId === targetId) return;
      const fromIdx = stops.findIndex(s => s.id === dragId);
      const toIdx = stops.findIndex(s => s.id === targetId);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = stops.splice(fromIdx, 1);
      stops.splice(toIdx, 0, moved);
      renderStops();
      validateForm();
    }
    function removeStop(id) {
      if (stops.length <= 1) return;
      stops = stops.filter(s => s.id !== id);
      stops.forEach((s, i) => { s.sequence = i + 1; });
      renderStops(); validateForm();
    }
    function addProductLine(stopId) {
      const s = stops.find(x => x.id === stopId); if (!s) return;
      const pc = firstProductClassId();
      s.products.push({
        productClass: pc,
        avgWeight: defaultAvgWeightForProductClass(pc),
        avgCube: defaultAvgCubeForProductClass(pc),
        pallets: ''
      });
      renderStops(); validateForm();
    }
    function removeProductLine(stopId, idx) {
      const s = stops.find(x => x.id === stopId); if (!s || s.products.length <= 1) return;
      s.products.splice(idx, 1); renderStops(); validateForm();
    }
    function renderStops() {
      const wrap = document.getElementById('stopsContainer');
      wrap.innerHTML = '';
      stops.forEach((stop, idx) => {
        stop.sequence = idx + 1;
        const card = document.createElement('div');
        card.className = `stop-card${idx % 2 === 1 ? ' alt' : ''}`;
        card.dataset.stopId = String(stop.id);
        card.innerHTML = `
          <div class="stop-header">
            <strong>Stop #${stop.sequence}</strong>
            <div class="stop-actions">
              <button class="drag-handle-btn" data-role="drag-handle" draggable="true" title="Drag to reorder stop"><i class="fas fa-grip-vertical"></i></button>
              <button class="btn btn-outline-danger btn-sm" data-role="remove-stop"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label fw-semibold">Delivery Facility <span class="text-danger">*</span></label>
            <select class="form-select" data-role="facility-select">${facilityOptionsHtml}</select>
          </div>
          <div class="table-responsive">
            <table class="table table-sm mini-grid mb-1">
              <thead><tr><th style="width:30%;">Product Class</th><th style="width:20%;">Average Weight (lbs)</th><th style="width:20%;">Average Cube (cu ft)</th><th style="width:20%;">Number of Pallets</th><th style="width:10%;"></th></tr></thead>
              <tbody data-role="products-body"></tbody>
            </table>
          </div>
          <button class="btn btn-outline-primary btn-sm" data-role="add-line"><i class="fas fa-plus"></i> Add Line</button>
        `;
        const dragHandle = card.querySelector('[data-role="drag-handle"]');
        dragHandle.addEventListener('dragstart', () => {
          draggingStopId = stop.id;
          card.classList.add('drag-source');
        });
        dragHandle.addEventListener('dragend', () => {
          draggingStopId = null;
          document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('drag-over', 'drag-source'));
        });
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!draggingStopId || draggingStopId === stop.id) return;
          card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          card.classList.remove('drag-over');
          moveStop(draggingStopId, stop.id);
        });
        card.querySelector('[data-role="remove-stop"]').addEventListener('click', () => removeStop(stop.id));
        card.querySelector('[data-role="add-line"]').addEventListener('click', () => addProductLine(stop.id));

        const tbody = card.querySelector('[data-role="products-body"]');
        stop.products.forEach((p, idx) => {
          if (!p.productClass) p.productClass = firstProductClassId();
          if (p.avgWeight === undefined || p.avgWeight === null || p.avgWeight === '') {
            p.avgWeight = defaultAvgWeightForProductClass(p.productClass);
          }
          if (p.avgCube === undefined || p.avgCube === null || p.avgCube === '') {
            p.avgCube = defaultAvgCubeForProductClass(p.productClass);
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><select class="form-select form-select-sm" data-role="pclass">${productClassOptionsHtml(p.productClass)}</select></td>
            <td><input type="number" min="0" step="0.01" class="form-control form-control-sm" data-role="avgWeight" value="${p.avgWeight}" /></td>
            <td><input type="number" min="0" step="0.01" class="form-control form-control-sm" data-role="avgCube" value="${p.avgCube}" /></td>
            <td><input type="number" min="0" step="0.01" class="form-control form-control-sm" data-role="pallets" value="${p.pallets}" /></td>
            <td><button class="btn btn-outline-danger btn-sm" data-role="remove-line"><i class="fas fa-times"></i></button></td>
          `;
          tr.querySelector('[data-role="pclass"]').addEventListener('change', e => {
            p.productClass = e.target.value;
            p.avgWeight = defaultAvgWeightForProductClass(p.productClass);
            p.avgCube = defaultAvgCubeForProductClass(p.productClass);
            renderStops();
            validateForm();
          });
          tr.querySelector('[data-role="avgWeight"]').addEventListener('input', e => { p.avgWeight = e.target.value; validateForm(); });
          tr.querySelector('[data-role="avgCube"]').addEventListener('input', e => { p.avgCube = e.target.value; validateForm(); });
          tr.querySelector('[data-role="pallets"]').addEventListener('input', e => { p.pallets = e.target.value; validateForm(); });
          tr.querySelector('[data-role="remove-line"]').addEventListener('click', () => removeProductLine(stop.id, idx));
          tbody.appendChild(tr);
        });

        const facilitySelect = card.querySelector('[data-role="facility-select"]');
        facilitySelect.value = stop.deliveryFacilityId || '';
        facilitySelect.addEventListener('change', () => {
          stop.deliveryFacilityId = facilitySelect.value;
          validateForm();
        });
        wrap.appendChild(card);
      });
    }
    function validateForm() {
      const submitBtn = document.getElementById('submitBtn');
      const submitStatus = document.getElementById('submitStatus');
      saveFormState();
      const terminal = document.getElementById('terminalSelect').value;
      if (!terminal) { submitBtn.disabled = true; setStatus(submitStatus, 'Terminal is required.', 'error'); return false; }
      const originFacilityId = document.getElementById('originSelect').value;
      if (!originFacilityId) { submitBtn.disabled = true; setStatus(submitStatus, 'Origin must be a valid facility in the master.', 'error'); return false; }
      if (!stops.length) { submitBtn.disabled = true; setStatus(submitStatus, 'At least one delivery stop is required.', 'error'); return false; }
      for (const s of stops) {
        if (!s.deliveryFacilityId) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: Delivery Facility must be selected from master.`, 'error'); return false; }
        if (!s.products.length) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: At least one Product Class line is required.`, 'error'); return false; }
        for (const p of s.products) {
          if (!p.productClass) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: Product Class is required.`, 'error'); return false; }
          if (p.avgWeight === '' || Number(p.avgWeight) <= 0) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: Average Weight must be greater than 0.`, 'error'); return false; }
          if (p.avgCube === '' || Number(p.avgCube) <= 0) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: Average Cube must be greater than 0.`, 'error'); return false; }
          if (p.pallets === '' || Number(p.pallets) < 0) { submitBtn.disabled = true; setStatus(submitStatus, `Stop ${s.sequence}: Pallets must be zero or greater.`, 'error'); return false; }
        }
      }
      const ps = document.getElementById('pickupStart').value, pe = document.getElementById('pickupEnd').value;
      const ds = document.getElementById('deliveryStart').value, de = document.getElementById('deliveryEnd').value;
      if (!ps || !pe || !ds || !de) { submitBtn.disabled = true; setStatus(submitStatus, 'All pickup/delivery date fields are required.', 'error'); return false; }
      if (new Date(pe) <= new Date(ps)) { submitBtn.disabled = true; setStatus(submitStatus, 'Pickup End must be later than Pickup Start.', 'error'); return false; }
      if (new Date(ds) <= new Date(pe)) { submitBtn.disabled = true; setStatus(submitStatus, 'Delivery Start must be later than Pickup End.', 'error'); return false; }
      if (new Date(de) <= new Date(ds)) { submitBtn.disabled = true; setStatus(submitStatus, 'Delivery End must be later than Delivery Start.', 'error'); return false; }
      submitBtn.disabled = false;
      setStatus(submitStatus, 'Ready to submit.', 'success');
      return true;
    }
    async function submitRequest() {
      if (!validateForm()) return;
      const submitBtn = document.getElementById('submitBtn');
      const submitStatus = document.getElementById('submitStatus');
      const org = document.getElementById('orgInput').value.trim();
      const payload = {
        orderType: 'Manual Dispatch Request',
        terminal: document.getElementById('terminalSelect').value,
        defaults: {
          driverType: document.getElementById('driverType').value,
          tractorType: document.getElementById('tractorType').value,
          trailerType: document.getElementById('trailerType').value
        },
        originFacilityId: document.getElementById('originSelect').value || null,
        pickupStart: document.getElementById('pickupStart').value,
        pickupEnd: document.getElementById('pickupEnd').value,
        deliveryStart: document.getElementById('deliveryStart').value,
        deliveryEnd: document.getElementById('deliveryEnd').value,
        stops: stops.map(s => ({
          sequence: Number(s.sequence),
          deliveryFacilityId: s.deliveryFacilityId || null,
          productLines: s.products.map(p => ({
            productClass: p.productClass,
            avgWeight: Number(p.avgWeight),
            avgCube: Number(p.avgCube),
            pallets: Number(p.pallets)
          }))
        }))
      };

      submitBtn.disabled = true;
      setStatus(submitStatus, 'Submitting request...', 'info');
      try {
        const res = await api('submit_request', { org, token, payload });
        const toDebug = res && res.toCreateDebug ? res.toCreateDebug : null;
        if (toDebug) {
          console.groupCollapsed('[Dispatch Request] TO Create Debug');
          console.log('POST /routing/api/routing/transportationOrder payload:', toDebug.requestPayload);
          console.log('TO create full response:', {
            status: toDebug.responseStatus,
            responseJson: toDebug.responseJson,
            responseText: toDebug.responseText
          });
          console.groupEnd();
        }
        if (!res.success) { setStatus(submitStatus, res.error || 'Submit failed.', 'error'); return; }
        const niceMsg = res.message || (res.toNumber ? `Transportation Order created successfully: ${res.toNumber}` : 'Submitted.');
        setStatus(submitStatus, niceMsg, 'success');
      } catch (e) {
        setStatus(submitStatus, 'Submit failed.', 'error');
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    }
    async function loadFormData() {
      const org = document.getElementById('orgInput').value.trim();
      const submitStatus = document.getElementById('submitStatus');
      setStatus(submitStatus, 'Loading terminals, facilities, and product classes...', 'info');
      isBootstrappingForm = true;
      try {
        const [facRes, pcRes] = await Promise.all([
          api('facilities', { org, token }),
          api('product_classes', { org, token })
        ]);
        if (!facRes.success) { setStatus(submitStatus, facRes.error || 'Failed loading facilities.', 'error'); return false; }
        if (!pcRes.success) { setStatus(submitStatus, pcRes.error || 'Failed loading product classes.', 'error'); return false; }
        allFacilities = (facRes.facilities || []).sort((a, b) => (a.FacilityId || '').localeCompare(b.FacilityId || ''));
        productClassOptions = (pcRes.productClasses || []).slice();
        facilityOptionsHtml = '<option value="">-- Select Facility --</option>' +
          allFacilities.map(f => `<option value="${f.FacilityId}">${facilityLabel(f)}</option>`).join('');

        const originSelect = document.getElementById('originSelect');
        originSelect.innerHTML = facilityOptionsHtml;
        originSelect.addEventListener('change', validateForm);

        const terminalSel = document.getElementById('terminalSelect');
        terminalSel.innerHTML = '<option value="">-- Select Terminal --</option>';
        (facRes.terminals || []).forEach(t => {
          const o = document.createElement('option');
          o.value = t.TerminalId;
          o.textContent = t.Display || t.TerminalId;
          terminalSel.appendChild(o);
        });
        terminalSel.value = '';
        resetTypeDropdowns();
        stops = [];
        idSeq = 1;
        addStop();
        setStatus(submitStatus, 'Terminals/facilities/product classes loaded.', 'success');
        return true;
      } finally {
        isBootstrappingForm = false;
      }
    }
    async function authenticate() {
      const org = document.getElementById('orgInput').value.trim();
      const authStatus = document.getElementById('authStatus');
      if (!org) { setStatus(authStatus, 'ORG is required.', 'error'); return; }
      setStatus(authStatus, 'Authenticating...', 'info');
      const res = await api('auth', { org });
      if (!res.success) { setStatus(authStatus, res.error || 'Authentication failed.', 'error'); return; }
      token = res.token;
      setStatus(authStatus, 'Authenticated.', 'success');
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      await loadFormData();
      await restoreFormState();
      applyDateDefaults();
      validateForm();
    }

    document.getElementById('authBtn').addEventListener('click', authenticate);
    document.getElementById('submitBtn').addEventListener('click', submitRequest);
    document.getElementById('addStopBtn').addEventListener('click', addStop);
    document.getElementById('terminalSelect').addEventListener('change', loadTerminalResourceDefaults);
    document.getElementById('driverType').addEventListener('change', validateForm);
    document.getElementById('tractorType').addEventListener('change', validateForm);
    document.getElementById('trailerType').addEventListener('change', validateForm);
    ['pickupStart','pickupEnd','deliveryStart','deliveryEnd'].forEach(id => document.getElementById(id).addEventListener('input', validateForm));
    document.getElementById('orgInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') authenticate(); });

    const themeBtn = document.getElementById('themeBtn');
    const themePopup = document.getElementById('themePopup');
    themeBtn.addEventListener('click', (e) => { e.stopPropagation(); themePopup.classList.toggle('visible'); });
    document.addEventListener('click', () => themePopup.classList.remove('visible'));
    themePopup.addEventListener('click', (e) => e.stopPropagation());
    document.querySelectorAll('.theme-option').forEach(opt => opt.addEventListener('click', () => { applyTheme(opt.dataset.theme); themePopup.classList.remove('visible'); }));

    (async function init() {
      try { await api('app_opened', {}); } catch (_) {}
      const params = new URLSearchParams(window.location.search);
      const startupOrg = (params.get('ORG') || params.get('Organization') || '').trim();
      if (startupOrg) document.getElementById('orgInput').value = startupOrg;
      if ((params.get('Theme') || '').toUpperCase() === 'N') document.getElementById('themeContainer').style.display = 'none';
      const savedTheme = localStorage.getItem('dispatch_request_theme') || 'light';
      applyTheme(THEMES[savedTheme] ? savedTheme : 'light');
      if (startupOrg) await authenticate(); else setStatus(document.getElementById('authStatus'), 'Enter ORG to authenticate.', 'info');
    })();
  </script>
</body>
</html>
